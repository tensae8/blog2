[outputs]
  home = ["HTML", "RSS", "JSON"]

[related]
  threshold = 0
  toLower = false

    [[related.indices]]
        name = "etiquetas"
        weight = 100

    [[related.indices]]
        name = "categorías"
        weight = 100

    [[related.indices]]
        name = "series"
        weight = 50

    [[related.indices]]
        name = "autores"
        weight = 20

    [[related.indices]]
        name = "fecha"
        weight = 10

    [[related.indices]]
      applyFilter = false
      name = 'fragmentrefs'
      type = 'fragments'
      weight = 10
 
  [footer]
  custom = true

